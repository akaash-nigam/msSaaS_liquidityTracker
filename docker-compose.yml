version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: liquidity-tracker-db
    environment:
      POSTGRES_DB: liquidity_tracker
      POSTGRES_USER: liquidity_user
      POSTGRES_PASSWORD: password123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liquidity_user -d liquidity_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
